    <style>

            overflow-x: hidden;

        img { max-width: 100%; display: block; }

        /* ─── COVER ANIMATION (intro) ─── */
        .cover-stage {
            position: fixed; inset: 0;
            background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
            perspective: 2200px;
        }
        .cover-stage.hidden { pointer-events: none; }
        .cover-book {
            position: relative;
            width: min(70vw, 320px);
            aspect-ratio: 3 / 4;
            cursor: pointer;
            transform-origin: right center;
            transform-style: preserve-3d;
            opacity: 0;
            transform: scale(0.96);
            transition: opacity 400ms var(--ease), transform 400ms var(--ease);
            box-shadow: var(--shadow-cover);
            border-radius: 6px 12px 12px 6px;
            overflow: hidden;
        }
        .cover-stage.ready .cover-book { opacity: 1; transform: scale(1); }
        .cover-stage.opening .cover-book {
            transition: transform 800ms var(--ease), opacity 600ms ease 300ms;
            transform: rotateY(-150deg);
            opacity: 0;
        }
        .cover-book img { width: 100%; height: 100%; object-fit: cover; user-select: none; -webkit-user-drag: none; }
        .cover-book::after {
            content: ""; position: absolute; top: 0; bottom: 0; right: 0; width: 8px;
            background: linear-gradient(to left, rgba(44, 36, 22, 0.28), transparent);
            pointer-events: none;
        }
        .cover-title-overlay {
            position: absolute; top: 9%; left: 0; right: 0;
            text-align: center; padding: 0 14%;
        }
        .cover-title-overlay h1 {
            font-family: 'Frank Ruhl Libre', serif; font-weight: 900;
            font-size: clamp(1.4rem, 5.2vw, 1.9rem);
            line-height: 1.1;
            color: var(--accent-clay-deep);
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        .cover-title-overlay .sub {
            display: block; margin-top: 6px;
            font-family: 'Heebo', sans-serif; font-weight: 400;
            font-size: clamp(0.75rem, 2.4vw, 0.9rem);
            letter-spacing: 0.12em;
            color: var(--accent-clay);
        }
        .cover-hint {
            position: absolute; bottom: 8%; left: 50%;
            transform: translateX(-50%);
            color: var(--bg-primary);
            font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
            text-shadow: 0 1px 4px rgba(44, 36, 22, 0.5);
            background: rgba(44, 36, 22, 0.5);
            padding: 8px 16px; border-radius: 999px;
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            display: flex; gap: 6px; align-items: center;
            animation: pulse 1.8s ease-in-out infinite;
            white-space: nowrap;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.9; transform: translateX(-50%) translateY(0); }
            50% { opacity: 1; transform: translateX(-50%) translateY(-3px); }
        }

        /* ─── PAGE WRAP / BRAND / INTRO ─── */
        .page-wrap {
            opacity: 0;
            transition: opacity 500ms var(--ease) 100ms;
            min-height: 100vh;
            display: flex; flex-direction: column;

        .page-wrap.visible { opacity: 1; }
        .skip-animation .cover-stage { display: none; }
        .skip-animation .page-wrap { opacity: 1; transition: none; }

        /* ─── FLIPBOOK (turn.js) ─── */
        .book-wrap {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 16px 12px 8px;
        }
        .flipbook {
            box-shadow: var(--shadow-book);
            border-radius: 6px;
            /* Mirror the whole book so the page-fold/peel appears on the LEFT side
               (Hebrew convention: spine on right, free edge & corner peel on left) */
            transform: scaleX(-1);
            /* turn.js sets width/height inline */
        }
        /* Un-mirror page contents so text/images render correctly */
        .flipbook .pg,
        .flipbook .pg-cover {
            transform: scaleX(-1);
        }
        .flipbook .page {
            background: var(--bg-page);
            background-image:
                url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='p'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.37  0 0 0 0 0.23  0 0 0 0.05 0'/></filter><rect width='100%' height='100%' filter='url(%23p)'/></svg>");
            overflow: hidden;
        }
        .flipbook .hard {
            background: var(--accent-clay);
            color: var(--bg-primary);
        }
        /* Page inner layout */
        .pg {
            position: relative;
            width: 100%; height: 100%;
            padding: 22px 20px 28px;
            display: flex; flex-direction: column;

        }
        .pg-content-half {
            flex: 1;
            padding: 14px 18px 16px;
            display: flex; flex-direction: column;
            min-height: 0; overflow: hidden;
            position: relative;
        }
        .pg-content-half .page-num {
            position: absolute; top: -22px; left: 12px;

        }
        .pg-content-half .recipe-name {

        }
        .pg-content-half .scrollable {
            flex: 1; overflow-y: auto;
            padding-left: 6px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-soft) transparent;
            -webkit-mask-image: linear-gradient(to bottom, #000 calc(100% - 16px), transparent);
                    mask-image: linear-gradient(to bottom, #000 calc(100% - 16px), transparent);
        }
        .pg-content-half .scrollable::-webkit-scrollbar { width: 4px; }
        .pg-content-half .scrollable::-webkit-scrollbar-track { background: transparent; }
        .pg-content-half .scrollable::-webkit-scrollbar-thumb {

        }
        .pg-content-half h3 {

        }
        .pg-content-half h3::before {

        }
        .pg-content-half ul, .pg-content-half ol {

        }
        .pg-content-half ul li, .pg-content-half ol li { margin-bottom: 2px; }
        .pg-content-half ul li::marker { color: var(--accent-olive); }
        .pg-content-half ol li::marker { color: var(--accent-clay); font-weight: 700; }
        .pg-content-half ul li.sub-header {
            list-style: none;
            margin-right: -1.2em;

        }
        .pg-image {

        }
        .pg-image .img-wrap {
            width: 100%; height: 100%;
            background: var(--border-soft);
        }
        .pg-image img {
            width: 100%; height: 100%; object-fit: cover; display: block;
        }
        .pg-content {
            padding: 26px 24px 26px;
            font-size: 0.95rem;
        }
        .pg-content .page-num {
            position: absolute; top: 12px; left: 16px;
            font-family: 'Frank Ruhl Libre', serif;

            color: var(--accent-gold);
            letter-spacing: 0.2em;

        }
        .pg-content .recipe-name {
            font-family: 'Frank Ruhl Libre', serif; font-weight: 700;

        }
        .pg-content .recipe-dedication {

        .pg-content h3 {
            font-family: 'Frank Ruhl Libre', serif; font-weight: 700;
            font-size: 1.02rem;
            color: var(--accent-clay-deep);
            margin: 12px 0 6px;
            display: flex; align-items: center; gap: 8px;
        }
        .pg-content h3::before {
            content: ""; width: 14px; height: 1.5px;
            background: var(--accent-gold);
        }
        .pg-content ul, .pg-content ol {
            padding-right: 1.2em;
            color: var(--text-primary);
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .pg-content ul li, .pg-content ol li { margin-bottom: 4px; }
        .pg-content ul li::marker { color: var(--accent-olive); }
        .pg-content ol li::marker { color: var(--accent-clay); font-weight: 700; }
        .pg-content ul li.sub-header {
            list-style: none;
            margin-right: -1.2em;
            margin-top: 8px; margin-bottom: 2px;
            font-weight: 700;
            color: var(--accent-clay-deep);

        }
        .pg-content .scrollable {
            flex: 1;
            overflow-y: auto;
            padding-left: 8px;

            scrollbar-color: var(--border-soft) transparent;
        }
        .pg-content .scrollable::-webkit-scrollbar {

        }
        .pg-content .scrollable::-webkit-scrollbar-track {

        }
        .pg-content .scrollable::-webkit-scrollbar-thumb {

            border-radius: 999px;
        }
        .pg-content .scrollable::-webkit-scrollbar-thumb:hover {

        }
        .recipe-share {
            margin-top: 14px;

            display: inline-flex; align-items: center; gap: 8px;

            font-weight: 700; font-size: 0.88rem;
            transition: background 200ms var(--ease), transform 200ms var(--ease);
            box-shadow: 0 4px 14px rgba(139, 94, 60, 0.28);
        }
        .share-btn:hover, .share-btn:focus-visible {
            background: var(--accent-clay-deep);
            transform: translateY(-1px);
        }
        .share-btn svg { width: 14px; height: 14px; fill: currentColor; }

        /* Hard cover page styling */
        .pg-cover {
            position: relative;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background:
                radial-gradient(ellipse at center, rgba(255,255,255,0.06) 0%, transparent 70%),
                linear-gradient(135deg, var(--accent-clay) 0%, var(--accent-clay-deep) 100%);
            color: var(--bg-primary);
            padding: 24px;
            text-align: center;
        }
        .pg-cover img {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.55;
        }
        .pg-cover .cover-title {
            position: relative;
            z-index: 2;
        }
        .pg-cover .cover-title h2 {
            font-family: 'Frank Ruhl Libre', serif; font-weight: 900;
            font-size: clamp(1.6rem, 3.2vw, 2.2rem);
            color: var(--bg-primary);
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            margin-bottom: 8px;
        }
        .pg-cover .cover-title .sub {
            display: block;
            font-family: 'Heebo', sans-serif; font-weight: 500;
            font-size: clamp(0.9rem, 1.8vw, 1.05rem);
            letter-spacing: 0.12em;
            color: var(--bg-primary);
            opacity: 0.9;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
        }

        /* ─── BOOK STATUS / HINT ─── */
        .book-status {
            display: flex; flex-direction: column; align-items: center;
            gap: 4px;
            margin: 8px auto 12px;
            padding: 0 16px;
            text-align: center;
        }
        .page-indicator {
            font-family: 'Frank Ruhl Libre', serif;
            font-weight: 500;
            color: var(--accent-clay-deep);
            font-size: 0.95rem;
        }
        .page-indicator strong {
            font-weight: 900; color: var(--accent-clay);
            font-size: 1.15rem;
        }
        .flip-hint {
            font-size: 0.82rem;
            color: var(--text-secondary);
            opacity: 0.75;
            letter-spacing: 0.02em;
        }
        /* Clickable flip zones overlaying book halves */
        .book-wrap { position: relative; }
        .flip-zone {
            position: absolute;
            top: 0; bottom: 0;
            width: 18%;
            min-width: 60px;
            z-index: 5;
            cursor: pointer;
            background: transparent;
            border: 0;
            padding: 0;
        }
        .flip-zone.flip-right { right: 0; }
        .flip-zone.flip-left  { left: 0; }
        .flip-zone::after {
            content: "";
            position: absolute;
            top: 50%; transform: translateY(-50%);
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(139, 94, 60, 0.12);
            border: 1.5px solid rgba(139, 94, 60, 0.25);
            opacity: 0;
            transition: opacity 220ms var(--ease);
        }
        .flip-zone.flip-right::after { right: 8px; }
        .flip-zone.flip-left::after  { left: 8px; }
        .flip-zone:hover::after { opacity: 1; }
        .flip-zone::before {
            content: "";
            position: absolute;
            top: 50%; transform: translateY(-50%);
            width: 12px; height: 12px;
            border: 2px solid var(--accent-clay);
            border-top: 0; border-right: 0;
            opacity: 0;
            transition: opacity 220ms var(--ease);
        }
        .flip-zone.flip-right::before {
            right: 20px;
            transform: translateY(-50%) rotate(45deg); /* ◀ pointing left  */
        }
        .flip-zone.flip-left::before {
            left: 20px;
            transform: translateY(-50%) rotate(-135deg); /* ▶ pointing right */
        }
        .flip-zone:hover::before { opacity: 1; }
        .flip-zone[disabled] { pointer-events: none; opacity: 0.3; }
        .flip-zone[disabled]::after, .flip-zone[disabled]::before { display: none; }

        .dot-nav {
            display: flex; justify-content: center; gap: 10px;
            margin: 0 auto 10px;
            padding: 0 16px;
        }
        .dot-nav button {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--border-soft);
            border: 2px solid var(--bg-primary);
            transition: background 200ms var(--ease), transform 200ms var(--ease);
            padding: 0;
        }
        .dot-nav button.active {
            background: var(--accent-clay);
            transform: scale(1.2);
        }

        }
        footer.foot .credit {
            font-size: 12px; opacity: 0.65;
            letter-spacing: 0.08em; line-height: 1.6;
        }

            position: fixed; bottom: 22px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text-primary); color: var(--bg-primary);
            padding: 12px 22px; border-radius: 999px;
            font-weight: 600; font-size: 0.95rem;
            box-shadow: 0 12px 32px rgba(44, 36, 22, 0.3);
            z-index: 9999;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s var(--ease), transform 0.25s var(--ease);
            max-width: calc(100vw - 32px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
            html { scroll-behavior: auto; }
            .cover-stage.opening .cover-book { opacity: 0; transform: none; }
        }

        /* ─── MOBILE: no flipbook, vertical scroll cards ─── */
        @media (max-width: 899px) {
            .book-wrap {
                padding: 12px 14px 8px;
                align-items: stretch;
            }
            .flipbook {
                transform: none !important;
                box-shadow: none !important;
                background: transparent !important;
                width: 100% !important;
                height: auto !important;
                display: flex; flex-direction: column;
                gap: 22px;
                border-radius: 0;
                max-width: 460px;
                margin: 0 auto;
            }
            .flipbook .pg,
            .flipbook .pg-cover { transform: none !important; }
            .flipbook .page {
                position: relative !important;
                inset: auto !important;
                width: 100% !important;
                height: auto !important;
                border-radius: 16px;
                box-shadow: var(--shadow-page);
                scroll-margin-top: 12px;
            }
            .flipbook .hard { display: none; }
            .pg { height: auto; overflow: visible; }
            .pg-combined { display: flex; flex-direction: column; }
            .pg-img-half {
                flex: 0 0 auto;
                height: 220px;
                min-height: 0; max-height: none;
            }
            .pg-content-half {
                flex: 0 0 auto;
                overflow: visible;
                padding: 18px 20px 18px;
            }
            .pg-content-half .scrollable {
                overflow: visible;
                flex: 0 0 auto;
                padding-left: 0;
                -webkit-mask-image: none;
                        mask-image: none;
            }
            .pg-content-half .page-num { display: none; }
            .flip-zone { display: none !important; }
            .book-status .flip-hint { display: none; }
            .pg-content-half ul, .pg-content-half ol {
                font-size: 0.9rem;
                line-height: 1.55;
            }
            .pg-content-half ul li, .pg-content-half ol li { margin-bottom: 4px; }
            .pg-content-half h3 { font-size: 1rem; margin: 10px 0 6px; }
            .pg-content-half .recipe-name { font-size: 1.3rem; }
            .pg-content-half .recipe-dedication { font-size: 0.82rem; margin-bottom: 10px; padding-bottom: 8px; }
            .pg-content-half .share-btn { padding: 9px 18px; font-size: 0.9rem; }
        }
    </style>
</head>

<body>

    <!-- Cover animation stage -->
    <div class="cover-stage" id="coverStage" aria-hidden="true">
        <div class="cover-book" id="coverBook" role="button" tabindex="0" aria-label="הקליקי כדי לפתוח את הספר">
            <img src="images/cover.webp" alt="" width="900" height="1200" fetchpriority="high">
            <div class="cover-title-overlay">
                <h1>מהמטבחים שלנו</h1>
                <span class="sub">שבועות תשפ״ו</span>
            </div>
            <span class="cover-hint" aria-hidden="true">
                <span>✦</span>
                <span>הקליקי לפתיחה</span>
            </span>
        </div>
    </div>

    <!-- Main page content -->
    <div class="page-wrap" id="pageWrap">

        <header class="brand" aria-label="חסויות הפרויקט">
            <div class="container">
                <img src="images/maganim-center.webp" alt="מרכז חוסן קהילתי - מחוז חיפה" class="brand-logo" loading="eager" decoding="async">
                <img src="images/oref-haifa.webp" alt="פיקוד העורף - מחוז חיפה" class="brand-logo" loading="eager" decoding="async">
                <img src="images/shaagat-hari-logo.webp" alt="שאגת הארי" class="brand-logo" loading="eager" decoding="async">
            </div>
        </header>

        <section class="intro">
            <h1>מהמטבחים שלנו</h1>
            <span class="holiday">שבועות תשפ״ו · מנשות מילואים</span>
        </section>

        <div class="book-wrap">
            <div class="flipbook" id="flipbook" aria-label="ספר מתכונים">
                <!-- pages injected by JS -->
            </div>
            <button type="button" class="flip-zone flip-right" id="flipRight" aria-label="העמוד הקודם" title="הקודם"></button>
            <button type="button" class="flip-zone flip-left" id="flipLeft" aria-label="העמוד הבא" title="הבא"></button>
        </div>

        <div class="book-status" aria-label="ניווט בספר">
            <span class="page-indicator" aria-live="polite">
                מתכון <strong id="curRecipe">–</strong> מתוך <span id="totalRecipes">–</span>
            </span>
            <span class="flip-hint" aria-hidden="true">הקליקי או גררי את הדף לצד השני ↔</span>
        </div>

        <div class="dot-nav" id="dotNav" aria-label="קפיצה ישירה למתכון"></div>

        <footer class="foot">
            <p class="thanks">תודה לכל המשפחות שתרמו מהמטבח שלהן ❤️</p>
            <p class="credit">מהמטבחים שלנו · שבועות תשפ״ו</p>
        </footer>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="vendor/jquery.min.js"></script>
    <script src="vendor/turn.min.js"></script>
    <script>
        (function () {
            'use strict';

            const COVER_AUTO_OPEN_MS = 2000;
            const STORAGE_KEY = 'mitbachot-shavuot-cover-shown';

            const stage = document.getElementById('coverStage');
            const coverEl = document.getElementById('coverBook');
            const pageWrap = document.getElementById('pageWrap');
            const flipbook = document.getElementById('flipbook');
            const dotNav = document.getElementById('dotNav');
            const flipRightEl = document.getElementById('flipRight');
            const flipLeftEl = document.getElementById('flipLeft');
            const curRecipeEl = document.getElementById('curRecipe');
            const totalRecipesEl = document.getElementById('totalRecipes');
            const toastEl = document.getElementById('toast');

            const initialHashId = parseRecipeHash();
            const seenThisSession = sessionStorage.getItem(STORAGE_KEY) === '1';

            let recipes = [];
            let totalPages = 0;
            let isMobile = window.innerWidth < 900;

            function parseRecipeHash() {
                const m = /^#recipe-(\d+)$/.exec(location.hash || '');
                return m ? parseInt(m[1], 10) : null;
            }

            /* On mobile: 1 page per recipe (image+content combined). On desktop: 2 pages per recipe (image+content split, paired in spread). */
            function recipeFirstPage(idx) {
                return isMobile ? 2 + idx : 2 + idx * 2;
            }
            function pageToRecipeIdx(page) {
                if (page < 2) return -1;
                const stride = isMobile ? 1 : 2;
                const i = Math.floor((page - 2) / stride);
                if (i < 0 || i >= recipes.length) return -1;
                return i;
            }

            /* ─── Cover animation ─── */
            function skipCover() {
                document.body.classList.add('skip-animation');
                stage.setAttribute('aria-hidden', 'true');
                pageWrap.classList.add('visible');
                requestAnimationFrame(boot);
            }
            function openCover() {
                if (stage.classList.contains('opening')) return;
                stage.classList.add('opening');
                sessionStorage.setItem(STORAGE_KEY, '1');
                setTimeout(() => {
                    stage.classList.add('hidden');
                    stage.style.display = 'none';
                    pageWrap.classList.add('visible');
                    requestAnimationFrame(boot);
                }, 820);
            }
            if (initialHashId !== null || seenThisSession) {
                skipCover();
            } else {
                requestAnimationFrame(() => stage.classList.add('ready'));
                const autoTimer = setTimeout(openCover, COVER_AUTO_OPEN_MS);
                coverEl.addEventListener('click', () => { clearTimeout(autoTimer); openCover(); });
                coverEl.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        clearTimeout(autoTimer);
                        openCover();
                    }
                });
            }

            /* ─── Toast ─── */
            let toastTimer;
            function showToast(msg) {
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
            }

            /* ─── Rendering ─── */
            function escapeHtml(s) {
                return String(s).replace(/[&<>"']/g, c => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                }[c]));
            }
            function isSubHeader(line) {
                const t = String(line).trim();
                return t.length > 0 && t.length < 22 && t.endsWith(':');
            }
            function renderIngredients(items) {
                return items.map(item => {
                    const cls = isSubHeader(item) ? ' class="sub-header"' : '';
                    return `<li${cls}>${escapeHtml(item)}</li>`;
                }).join('');
            }

            function buildPages() {
                isMobile = window.innerWidth < 900;
                const parts = [];

                /* Page 1: Hard front cover */
                parts.push(`
                    <div class="hard">
                      <div class="pg-cover">
                        <img src="images/cover.webp" alt="">
                        <div class="cover-title">
                          <h2>מהמטבחים שלנו</h2>
                          <span class="sub">שבועות תשפ״ו</span>
                        </div>
                      </div>
                    </div>
                `);

                /* MOBILE: each recipe = 1 combined page (image + content). DESKTOP: each recipe = 2-page spread (content LEFT, image RIGHT). */
                recipes.forEach((r, i) => {
                    const num = String(i + 1).padStart(2, '0');
                    if (isMobile) {
                        parts.push(`
                            <div class="page" data-recipe-id="${r.id}" id="recipe-${r.id}">
                              <div class="pg pg-combined">
                                <div class="pg-img-half">
                                  <img src="images/${escapeHtml(r.image)}" alt="${escapeHtml(r.name)}" loading="${i < 2 ? 'eager' : 'lazy'}" decoding="async">
                                </div>
                                <div class="pg-content-half">
                                  <span class="page-num">— ${num} —</span>
                                  <h2 class="recipe-name">${escapeHtml(r.name)}</h2>
                                  <p class="recipe-dedication">${escapeHtml(r.dedication)}</p>
                                  <div class="scrollable">
                                    <h3>רכיבים</h3>
                                    <ul>${renderIngredients(r.ingredients || [])}</ul>
                                    <h3>הכנה</h3>
                                    <ol>${(r.instructions || []).map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ol>
                                  </div>
                                  <div class="recipe-share">
                                    <button class="share-btn" data-share data-name="${escapeHtml(r.name)}" data-family="${escapeHtml(r.family)}" data-id="${r.id}">
                                      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a3 3 0 1 0-2.83-4H15.1a3 3 0 0 0 .11 1.94L8.82 8.69A3 3 0 1 0 8.82 15.31l6.39 3.75A3 3 0 1 0 16.18 17.3l-6.39-3.75a3 3 0 0 0 0-2.7l6.4-3.76A3 3 0 0 0 18 8Z"/></svg>
                                      <span>שתפי את המתכון</span>
                                    </button>
                                  </div>
                                </div>
                              </div>
                            </div>
                        `);
                        return;
                    }
                    /* DESKTOP: CONTENT page first (even/LEFT in spread) */
                    parts.push(`
                        <div class="page" data-recipe-id="${r.id}" data-pg-type="content">
                          <div class="pg pg-content">
                            <span class="page-num">— ${num} —</span>
                            <h2 class="recipe-name">${escapeHtml(r.name)}</h2>
                            <p class="recipe-dedication">${escapeHtml(r.dedication)}</p>
                            <div class="scrollable">
                              <h3>רכיבים</h3>
                              <ul>${renderIngredients(r.ingredients || [])}</ul>
                              <h3>הכנה</h3>
                              <ol>${(r.instructions || []).map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ol>
                            </div>
                            <div class="recipe-share">
                              <button class="share-btn" data-share data-name="${escapeHtml(r.name)}" data-family="${escapeHtml(r.family)}" data-id="${r.id}">
                                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a3 3 0 1 0-2.83-4H15.1a3 3 0 0 0 .11 1.94L8.82 8.69A3 3 0 1 0 8.82 15.31l6.39 3.75A3 3 0 1 0 16.18 17.3l-6.39-3.75a3 3 0 0 0 0-2.7l6.4-3.76A3 3 0 0 0 18 8Z"/></svg>
                                <span>שתפי את המתכון</span>
                              </button>
                            </div>
                          </div>
                        </div>
                    `);
                    /* IMAGE page second → RIGHT in RTL spread (read first) */
                    parts.push(`
                        <div class="page" data-recipe-id="${r.id}" data-pg-type="image" id="recipe-${r.id}">
                          <div class="pg pg-image">
                            <div class="img-wrap">
                              <img src="images/${escapeHtml(r.image)}" alt="${escapeHtml(r.name)}" loading="${i < 1 ? 'eager' : 'lazy'}" decoding="async">
                            </div>
                          </div>
                        </div>
                    `);
                });

                /* Last page: Hard back cover */
                parts.push(`
                    <div class="hard">
                      <div class="pg" style="display:flex;align-items:center;justify-content:center;text-align:center;font-family:'Frank Ruhl Libre',serif;color:var(--accent-clay-deep);">
                        <p style="font-size:1rem;line-height:1.7;padding:0 18px;opacity:.85;">תודה לכל המשפחות<br>שתרמו מהמטבח שלהן ❤️<br><span style="color:var(--accent-gold);font-size:1.3rem;">✦</span></p>
                      </div>
                    </div>
                `);

                flipbook.innerHTML = parts.join('');
                totalPages = isMobile ? (2 + recipes.length) : (2 + recipes.length * 2);
            }

            function renderDots() {
                dotNav.innerHTML = recipes.map((r, i) =>
                    `<button type="button" data-go="${i}" aria-label="עבור למתכון ${i + 1}: ${escapeHtml(r.name)}"></button>`
                ).join('');
            }

            /* ─── Size computation for turn.js ─── */
            function computeSize() {
                const wrap = document.querySelector('.book-wrap');
                const vw = Math.max(320, wrap.clientWidth - 24);
                let isDouble = window.innerWidth >= 900;
                const vh = isDouble
                    ? Math.max(360, window.innerHeight - 320)
                    : Math.max(440, window.innerHeight - 220);
                let pageW, pageH;
                if (isDouble) {
                    pageW = Math.min(420, Math.floor(vw / 2));
                    pageH = Math.min(580, Math.floor(pageW * 1.38));
                    /* fit height */
                    if (pageH > vh) { pageH = vh; pageW = Math.floor(pageH / 1.38); }
                } else {
                    pageW = Math.min(380, vw);
                    /* Taller pages on mobile so image + full recipe fit together */
                    pageH = Math.min(720, Math.floor(pageW * 1.75));
                    if (pageH > vh) pageH = vh;
                }
                return {
                    width: isDouble ? pageW * 2 : pageW,
                    height: pageH,
                    display: isDouble ? 'double' : 'single'
                };
            }

            /* ─── Turn.js init (desktop) / scroll nav (mobile) ─── */
            let turnReady = false;
            let mobileObserver = null;
            let currentMobileIdx = 0;

            function initMobileNav() {
                if (flipRightEl) flipRightEl.style.display = 'none';
                if (flipLeftEl) flipLeftEl.style.display = 'none';

                if (mobileObserver) { mobileObserver.disconnect(); mobileObserver = null; }
                const cards = flipbook.querySelectorAll('.page[data-recipe-id]');
                mobileObserver = new IntersectionObserver((entries) => {
                    /* Pick the most-visible entry */
                    let best = null;
                    entries.forEach(e => {
                        if (!best || e.intersectionRatio > best.intersectionRatio) best = e;
                    });
                    if (!best || best.intersectionRatio <= 0) return;
                    const id = parseInt(best.target.dataset.recipeId, 10);
                    const idx = recipes.findIndex(r => r.id === id);
                    if (idx < 0) return;
                    currentMobileIdx = idx;
                    curRecipeEl.textContent = idx + 1;
                    dotNav.querySelectorAll('button').forEach((b, i) => {
                        b.classList.toggle('active', i === idx);
                    });
                    if (location.hash !== `#recipe-${id}`) {
                        history.replaceState(null, '', `#recipe-${id}`);
                    }
                }, { threshold: [0.35, 0.6] });
                cards.forEach(c => mobileObserver.observe(c));
            }

            function initTurn() {
                if (isMobile) {
                    initMobileNav();
                    return;
                }
                if (typeof $ !== 'function' || !$.fn || !$.fn.turn) {
                    console.warn('turn.js not available');
                    return;
                }
                const size = computeSize();
                const $fb = $(flipbook);
                $fb.turn({
                    width: size.width,
                    height: size.height,
                    autoCenter: true,
                    direction: 'ltr',
                    display: size.display,
                    acceleration: true,
                    gradients: true,
                    elevation: 50,
                    duration: 900,
                    when: {
                        turning: function (e, page) {
                            updateChrome(page);
                        },
                        turned: function (e, page) {
                            updateChrome(page);
                            syncHash(page);
                        }
                    }
                });
                turnReady = true;
                if (flipRightEl) flipRightEl.style.display = 'block';
                if (flipLeftEl) flipLeftEl.style.display = 'block';
                updateChrome($fb.turn('page'));
            }

            /* Resize handler — rebuild when crossing the mobile/desktop breakpoint */
            let rTimer;
            window.addEventListener('resize', () => {
                clearTimeout(rTimer);
                rTimer = setTimeout(() => {
                    const newIsMobile = window.innerWidth < 900;
                    if (newIsMobile !== isMobile) {
                        let curIdx;
                        if (turnReady) {
                            try { curIdx = pageToRecipeIdx($(flipbook).turn('page')); } catch (e) {}
                            try { $(flipbook).turn('destroy'); } catch (e) {}
                            turnReady = false;
                        } else {
                            curIdx = currentMobileIdx;
                        }
                        if (mobileObserver) { mobileObserver.disconnect(); mobileObserver = null; }
                        isMobile = newIsMobile;
                        buildPages();
                        initTurn();
                        if (curIdx >= 0 && curIdx < recipes.length) {
                            setTimeout(() => {
                                if (isMobile) goRecipeMobile(curIdx, false);
                                else { try { $(flipbook).turn('page', recipeFirstPage(curIdx)); } catch (e) {} }
                            }, 100);
                        }
                        return;
                    }
                    if (turnReady) {
                        const s = computeSize();
                        try {
                            $(flipbook).turn('size', s.width, s.height);
                            $(flipbook).turn('display', s.display);
                        } catch (e) { console.warn(e); }
                    }
                }, 200);
            });

            function goRecipeMobile(idx, smooth = true) {
                if (idx < 0 || idx >= recipes.length) return;
                const id = recipes[idx].id;
                const el = document.getElementById(`recipe-${id}`);
                if (el) el.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto', block: 'start' });
            }

            function updateChrome(page) {
                const idx = pageToRecipeIdx(page);
                if (idx >= 0) {
                    curRecipeEl.textContent = idx + 1;
                } else {
                    curRecipeEl.textContent = '–';
                }
                /* LTR: flipRight = next (disabled at last page), flipLeft = prev (disabled at first) */
                if (flipRightEl) flipRightEl.toggleAttribute('disabled', page >= totalPages);
                if (flipLeftEl) flipLeftEl.toggleAttribute('disabled', page <= 1);
                dotNav.querySelectorAll('button').forEach((b, i) => {
                    b.classList.toggle('active', i === idx);
                });
            }

            function syncHash(page) {
                const idx = pageToRecipeIdx(page);
                if (idx >= 0) {
                    const id = recipes[idx]?.id;
                    if (id !== undefined && location.hash !== `#recipe-${id}`) {
                        history.replaceState(null, '', `#recipe-${id}`);
                    }
                } else if (location.hash) {
                    history.replaceState(null, '', location.pathname);
                }
            }

            /* ─── Controls ─── */
            function goPrev() {
                if (isMobile) { goRecipeMobile(currentMobileIdx - 1); return; }
                if (!turnReady) return;
                const $fb = $(flipbook);
                const cur = $fb.turn('page');
                const idx = pageToRecipeIdx(cur);
                if (idx > 0) $fb.turn('page', recipeFirstPage(idx - 1));
                else $fb.turn('previous');
            }
            function goNext() {
                if (isMobile) { goRecipeMobile(currentMobileIdx + 1); return; }
                if (!turnReady) return;
                const $fb = $(flipbook);
                const cur = $fb.turn('page');
                const idx = pageToRecipeIdx(cur);
                if (idx >= 0 && idx < recipes.length - 1) $fb.turn('page', recipeFirstPage(idx + 1));
                else $fb.turn('next');
            }

            function wireControls() {
                /* With CSS mirror on the flipbook, visual-right of book = next, visual-left = prev */
                if (flipRightEl) flipRightEl.addEventListener('click', goNext);
                if (flipLeftEl) flipLeftEl.addEventListener('click', goPrev);

                dotNav.addEventListener('click', (e) => {
                    const b = e.target.closest('button[data-go]');
                    if (!b) return;
                    const idx = parseInt(b.dataset.go, 10);
                    if (isMobile) goRecipeMobile(idx);
                    else if (turnReady) $(flipbook).turn('page', recipeFirstPage(idx));
                });

                /* Keyboard - LTR book: Right=next, Left=prev */
                document.addEventListener('keydown', (e) => {
                    if (stage && stage.style.display !== 'none' && !stage.classList.contains('hidden')) return;
                    if (e.target.closest('input, textarea, [contenteditable]')) return;
                    if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
                    else if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
                });

                /* Share */
                flipbook.addEventListener('click', async (e) => {
                    const btn = e.target.closest('[data-share]');
                    if (!btn) return;
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    const family = btn.dataset.family;
                    const url = `${location.origin}${location.pathname}#recipe-${id}`;
                    const text = `תראי את המתכון של משפחת ${family} 🍰`;
                    const shareData = { title: 'מהמטבחים שלנו', text: `${text}\n${url}`, url };
                    if (navigator.share) {
                        try { await navigator.share(shareData); } catch (_) {}
                        return;
                    }
                    try {
                        await navigator.clipboard.writeText(`${text} ${url}`);
                        showToast('הלינק הועתק 🙌');
                    } catch (_) {
                        const ta = document.createElement('textarea');
                        ta.value = `${text} ${url}`;
                        document.body.appendChild(ta);
                        ta.select();
                        try { document.execCommand('copy'); showToast('הלינק הועתק 🙌'); }
                        catch (_) { showToast('לא הצלחתי להעתיק'); }
                        document.body.removeChild(ta);
                    }
                });
            }

            /* ─── Boot ─── */
            function boot() {
                fetch('recipes.json', { cache: 'no-cache' })
                    .then(r => { if (!r.ok) throw new Error('failed'); return r.json(); })
                    .then(data => {
                        if (!data || !Array.isArray(data.recipes) || data.recipes.length === 0) {
                            throw new Error('invalid');
                        }
                        recipes = data.recipes;
                        totalRecipesEl.textContent = recipes.length;
                        buildPages();
                        renderDots();
                        wireControls();
                        initTurn();
                        /* Jump to anchored recipe if any */
                        if (initialHashId !== null) {
                            const idx = recipes.findIndex(r => r.id === initialHashId);
                            if (idx >= 0) {
                                setTimeout(() => {
                                    if (isMobile) goRecipeMobile(idx, false);
                                    else { try { $(flipbook).turn('page', recipeFirstPage(idx)); } catch (e) {} }
                                }, 100);
                            }
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        flipbook.innerHTML = '<div class="page"><div class="pg" style="display:flex;align-items:center;justify-content:center;text-align:center;color:var(--text-secondary);padding:40px;">לא הצלחנו לטעון את המתכונים. רעננו את הדף ונסו שוב.</div></div>';
                    });
            }
        })();
    </script>
</body>

</html>
